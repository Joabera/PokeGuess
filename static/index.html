<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokeGuess</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --accent: #fbbf24;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --bar: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 { margin: 0 0 0.25rem; font-size: 2rem; }
    h1 span { color: var(--accent); }
    p.tagline { margin: 0 0 1.75rem; color: var(--muted); }
    #drop {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 2px dashed #334155;
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    #drop.drag { border-color: var(--accent); background: #243449; }
    #drop p { margin: 0.5rem 0; color: var(--muted); }
    #preview {
      max-width: 100%;
      max-height: 256px;
      border-radius: 10px;
      margin: 1rem auto 0;
      display: none;
    }
    #results {
      width: 100%;
      max-width: 420px;
      margin-top: 1.5rem;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }
    .row .name { width: 110px; font-weight: 600; }
    .row.top .name { color: var(--accent); }
    .track {
      flex: 1;
      background: #334155;
      border-radius: 999px;
      height: 14px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      background: var(--bar);
      border-radius: 999px;
      transition: width .4s ease;
    }
    .row.top .fill { background: var(--accent); }
    .pct { width: 56px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
    .status { color: var(--muted); margin-top: 1rem; min-height: 1.2em; }
    #verdict {
      width: 100%;
      max-width: 420px;
      margin-top: 1.25rem;
      text-align: center;
    }
    #verdict.hidden { display: none; }
    #sprite {
      width: 160px;
      height: 160px;
      image-rendering: pixelated;
      object-fit: contain;
      display: none;
    }
    .winner { font-size: 1.4rem; font-weight: 700; margin-top: .25rem; }
    .winner .pct { color: var(--muted); font-size: 1rem; font-weight: 500; }
    .cry-btn {
      margin-top: .6rem;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: .35rem .9rem;
      border-radius: 8px;
      cursor: pointer;
      display: none;
    }
    .digimon {
      font-size: 1.25rem;
      font-weight: 600;
      color: #f87171;
      padding: 1rem;
      background: #2a1a1a;
      border-radius: 12px;
    }
    button.pick {
      margin-top: 1rem;
      background: var(--accent);
      color: #1e293b;
      border: none;
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Poke<span>Guess</span></h1>
  <p class="tagline">Drop, paste, or pick a Pokémon image &mdash; now with Gen 1 &amp; 2!</p>

  <div id="drop">
    <p><strong>Drag &amp; drop</strong> an image here</p>
    <p>or paste from clipboard (Ctrl/Cmd&nbsp;+&nbsp;V)</p>
    <button class="pick" type="button" id="pickBtn">Select image</button>
    <input type="file" id="fileInput" accept="image/*" hidden />
    <img id="preview" alt="preview" />
  </div>

  <div id="verdict" class="hidden">
    <img id="sprite" alt="" />
    <div class="winner" id="winner"></div>
    <button class="cry-btn" id="cryBtn">🔊 Play cry</button>
    <div class="digimon" id="digimon" style="display:none"></div>
  </div>

  <audio id="cry"></audio>

  <div id="results"></div>
  <div class="status" id="status"></div>

  <script>
    const drop = document.getElementById("drop");
    const fileInput = document.getElementById("fileInput");
    const pickBtn = document.getElementById("pickBtn");
    const preview = document.getElementById("preview");
    const results = document.getElementById("results");
    const status = document.getElementById("status");
    const verdict = document.getElementById("verdict");
    const sprite = document.getElementById("sprite");
    const winner = document.getElementById("winner");
    const digimon = document.getElementById("digimon");
    const cryBtn = document.getElementById("cryBtn");
    const cry = document.getElementById("cry");
    cry.volume = 0.35;

    const CONFIDENCE_THRESHOLD = 60;

    // Our class names don't all match PokéAPI's slugs (duplicate/odd spellings).
    const NAME_OVERRIDES = {
      "farfetch'd": "farfetchd",
      "farfetchd": "farfetchd",
      "mr. mime": "mr-mime",
      "mrmime": "mr-mime",
      "mime": "mr-mime",
      "nidoran1": "nidoran-f",
      "nidoran2": "nidoran-m",
    };
    function toApiName(name) {
      const key = name.toLowerCase();
      return NAME_OVERRIDES[key] || key.replace(/[.']/g, "").replace(/\s+/g, "-");
    }

    const pokeCache = {};
    async function fetchPokemon(name) {
      const slug = toApiName(name);
      if (pokeCache[slug]) return pokeCache[slug];
      const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${slug}`);
      if (!res.ok) throw new Error(`PokéAPI ${res.status}`);
      const json = await res.json();
      const data = {
        sprite:
          json.sprites?.other?.["official-artwork"]?.front_default ||
          json.sprites?.front_default ||
          "",
        cry: json.cries?.latest || json.cries?.legacy || "",
      };
      pokeCache[slug] = data;
      return data;
    }

    function showPreview(file) {
      const url = URL.createObjectURL(file);
      preview.src = url;
      preview.style.display = "block";
    }

    async function classify(file) {
      if (!file) return;
      showPreview(file);
      results.innerHTML = "";
      verdict.classList.add("hidden");
      status.textContent = "Classifying…";

      const form = new FormData();
      form.append("file", file);

      try {
        const res = await fetch("/predict", { method: "POST", body: form });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        render(data.predictions);
        status.textContent = data.model === "legacy-gen1"
          ? "via Gen-1 legacy model"
          : "via Gen 1+2 model";
      } catch (e) {
        status.textContent = "Error: " + e.message;
      }
    }

    function showVerdict(predictions) {
      const top = predictions[0];
      verdict.classList.remove("hidden");
      sprite.style.display = "none";
      cryBtn.style.display = "none";
      cry.pause();

      if (top.confidence < CONFIDENCE_THRESHOLD) {
        winner.textContent = "";
        digimon.style.display = "block";
        digimon.textContent =
          `Are you sure this isn't a Digimon? 😕 (best guess: ${top.name}, ${top.confidence.toFixed(1)}%)`;
        return;
      }

      digimon.style.display = "none";
      winner.innerHTML = `${top.name} <span class="pct">${top.confidence.toFixed(1)}%</span>`;

      fetchPokemon(top.name)
        .then((data) => {
          if (data.sprite) {
            sprite.src = data.sprite;
            sprite.alt = top.name;
            sprite.style.display = "inline-block";
          }
          if (data.cry) {
            cry.src = data.cry;
            cry.play().catch(() => {}); // autoplay may be blocked; button still works
            cryBtn.style.display = "inline-block";
          }
        })
        .catch(() => {
          /* PokéAPI unreachable — name + bars still show */
        });
    }

    cryBtn.addEventListener("click", () => {
      if (cry.src) { cry.currentTime = 0; cry.play().catch(() => {}); }
    });

    function render(predictions) {
      showVerdict(predictions);
      results.innerHTML = "";
      predictions.forEach((p, i) => {
        const row = document.createElement("div");
        row.className = "row" + (i === 0 ? " top" : "");
        row.innerHTML = `
          <div class="name">${p.name}</div>
          <div class="track"><div class="fill" style="width:0%"></div></div>
          <div class="pct">${p.confidence.toFixed(1)}%</div>`;
        results.appendChild(row);
        requestAnimationFrame(() => {
          row.querySelector(".fill").style.width = p.confidence + "%";
        });
      });
    }

    // Click to pick
    pickBtn.addEventListener("click", () => fileInput.click());
    drop.addEventListener("click", (e) => {
      if (e.target === drop) fileInput.click();
    });
    fileInput.addEventListener("change", () => classify(fileInput.files[0]));

    // Drag & drop
    ["dragenter", "dragover"].forEach((ev) =>
      drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("drag"); })
    );
    ["dragleave", "drop"].forEach((ev) =>
      drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("drag"); })
    );
    drop.addEventListener("drop", (e) => {
      const file = e.dataTransfer.files[0];
      if (file) classify(file);
    });

    // Clipboard paste
    window.addEventListener("paste", (e) => {
      const item = [...e.clipboardData.items].find((it) => it.type.startsWith("image/"));
      if (item) classify(item.getAsFile());
    });
  </script>
</body>
</html>
